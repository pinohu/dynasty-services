<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynasty Empire — Done-For-You Services</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--card:#18181b;--border:#27272a;--text:#fafafa;--muted:#a1a1aa;--dim:#71717a;--gold:#fbbf24;--gold-dark:#92700e}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--gold);text-decoration:none}
.container{max-width:1100px;margin:0 auto;padding:0 24px}

/* Nav */
nav{position:sticky;top:0;z-index:100;background:rgba(9,9,11,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px}
nav .inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;height:56px}
nav .logo{font-weight:900;font-size:16px;letter-spacing:-0.5px}
nav .logo span:first-child{color:var(--gold)}
nav .logo span:last-child{color:var(--dim)}
nav .cta-btn{background:var(--gold);color:#000;border:none;padding:8px 20px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer}

/* Hero */
.hero{text-align:center;padding:80px 24px 60px}
.hero .badge{display:inline-block;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);border-radius:20px;padding:6px 18px;margin-bottom:24px;font-size:12px;font-weight:600;color:var(--gold);letter-spacing:1px;text-transform:uppercase}
.hero h1{font-family:'DM Serif Display',serif;font-size:clamp(36px,5vw,60px);line-height:1.08;max-width:750px;margin:0 auto 20px;letter-spacing:-1px}
.hero h1 em{color:var(--gold);font-style:normal}
.hero p{color:var(--muted);font-size:17px;max-width:560px;margin:0 auto 36px}

/* Filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:0 24px 48px}
.filter-btn{background:var(--card);color:var(--dim);border:1px solid var(--border);padding:7px 18px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.filter-btn.active,.filter-btn:hover{background:rgba(251,191,36,.12);color:var(--gold);border-color:rgba(251,191,36,.3)}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;padding-bottom:80px}
.pkg-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px 24px;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.pkg-card:hover{border-color:rgba(251,191,36,.3);transform:translateY(-2px)}
.pkg-card .bar{position:absolute;top:0;left:0;right:0;height:3px}
.pkg-card .vertical-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.pkg-card h3{font-size:17px;font-weight:700;margin-bottom:8px;line-height:1.25}
.pkg-card .desc{color:var(--dim);font-size:13px;line-height:1.5;margin-bottom:18px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pkg-card .price{font-size:22px;font-weight:900}
.pkg-card .retainer{font-size:13px;font-weight:600}
.pkg-card .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
.pkg-card .tags span{background:rgba(255,255,255,.04);padding:3px 10px;border-radius:12px;font-size:11px;color:var(--muted)}

/* Detail Page */
.detail{display:none;padding:40px 0 80px}
.detail.active{display:block}
.back-btn{background:none;border:1px solid var(--border);color:var(--dim);padding:8px 20px;border-radius:6px;cursor:pointer;font-size:13px;margin-bottom:32px}
.detail-hero{border-radius:16px;padding:48px 40px;margin-bottom:32px;border:1px solid}
.detail-hero .label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:2px}
.detail-hero h1{font-family:'DM Serif Display',serif;font-size:34px;margin:12px 0 14px;line-height:1.15}
.detail-hero .subdesc{color:var(--muted);font-size:16px;line-height:1.6;max-width:580px}
.stat-boxes{display:flex;gap:20px;margin-top:28px;flex-wrap:wrap}
.stat-box{background:rgba(255,255,255,.05);border-radius:10px;padding:16px 24px}
.stat-box .stat-label{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:1px}
.stat-box .stat-value{font-size:26px;font-weight:800;margin-top:4px}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:32px}
@media(max-width:700px){.detail-grid{grid-template-columns:1fr}}
.detail-panel{background:var(--card);border-radius:14px;padding:32px 28px;border:1px solid var(--border)}
.detail-panel h3{font-size:17px;font-weight:700;margin-bottom:18px}
.check-item{display:flex;gap:10px;margin-bottom:11px;align-items:flex-start}
.check-item .check{font-size:15px;margin-top:2px}
.check-item span{color:#d4d4d8;font-size:14px}

.case-study-box{background:var(--card);border-radius:14px;padding:32px 28px;border:1px solid var(--border);margin-bottom:32px}
.case-study-box h3{font-size:20px;font-weight:700;margin-bottom:12px}
.case-study-box .headline{color:#d4d4d8;font-size:15px;line-height:1.6;margin-bottom:16px}
.metric-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.metric-tag{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.tech-stack{color:var(--dim);font-size:12px;font-family:'DM Mono',monospace}

.detail-cta{border-radius:14px;padding:40px 32px;text-align:center;border:1px solid;margin-bottom:32px}
.detail-cta h3{font-size:22px;font-weight:700;margin-bottom:10px}
.detail-cta p{color:var(--muted);margin-bottom:24px;font-size:14px}
.detail-cta button{border:none;padding:14px 36px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}

/* Email Sequence Section */
.email-section{background:var(--card);border-radius:14px;padding:32px 28px;border:1px solid var(--border);margin-bottom:24px}
.email-section h3{font-size:17px;font-weight:700;margin-bottom:16px}
.email-item{border-left:3px solid var(--gold);padding:12px 16px;margin-bottom:12px;background:rgba(255,255,255,.02);border-radius:0 8px 8px 0}
.email-item .day{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.email-item .subject{font-weight:600;font-size:14px;margin-bottom:4px}
.email-item .preview{color:var(--dim);font-size:12px;line-height:1.5}

/* Social Content Section */
.social-section{background:var(--card);border-radius:14px;padding:32px 28px;border:1px solid var(--border);margin-bottom:24px}
.social-post{background:rgba(255,255,255,.03);border-radius:10px;padding:16px;margin-bottom:12px}
.social-post .platform{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.social-post .content{font-size:13px;line-height:1.6;color:#d4d4d8;white-space:pre-line}

/* Intake Form */
.intake-section{background:var(--card);border-radius:14px;padding:32px 28px;border:1px solid var(--border);margin-bottom:24px}
.form-field{margin-bottom:16px}
.form-field label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.form-field input,.form-field select,.form-field textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:14px;font-family:inherit}
.form-field textarea{resize:vertical;min-height:80px}
.submit-btn{width:100%;background:var(--gold);color:#000;border:none;padding:14px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}

/* Proposal Preview */
.proposal-section{background:var(--card);border-radius:14px;padding:32px 28px;border:1px solid var(--border);margin-bottom:24px}
.proposal-page{background:#fff;color:#111;border-radius:8px;padding:32px;margin-bottom:16px;font-size:13px;line-height:1.6}
.proposal-page h4{color:var(--gold-dark);font-size:16px;margin-bottom:8px;font-family:'DM Serif Display',serif}
.proposal-page .gold-bar{height:4px;background:var(--gold);width:60px;margin-bottom:16px;border-radius:2px}

/* Footer */
footer{background:#111113;border-top:1px solid var(--border);padding:40px 24px;text-align:center}
footer p{color:var(--dim);font-size:13px}
</style>
</head>

      <button class="filter-btn ${!activeFilter?'active':''}" onclick="setFilter(null)">All (${PACKAGES.length})</button>
      ${verticals.map(v => `<button class="filter-btn ${activeFilter===v?'active':''}" onclick="setFilter('${v}')">${v} (${PACKAGES.filter(p=>p.v===v).length})</button>`).join('')}
    </div>
    <div class="grid container">
      ${filtered.map(pkg => `
        <div class="pkg-card" onclick="selectPkg('${pkg.id}')">
          <div class="bar" style="background:var(--gold)"></div>
          <div class="vertical-tag" style="color:var(--gold)">${pkg.v}</div>
          <h3>${pkg.name}</h3>
          <div class="desc">${pkg.desc}</div>
          <div>
            ${pkg.price>0?`<span class="price">$${pkg.price.toLocaleString()}</span>`:''}
            ${pkg.ret>0?`<span class="retainer" style="color:var(--gold);margin-left:${pkg.price>0?'12px':'0'}">${pkg.price>0?'+ ':''}$${pkg.ret}/mo</span>`:''}
          </div>
          <div class="tags">${pkg.features.slice(0,3).map(f=>`<span>${f}</span>`).join('')}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderDetail(app) {
  const pkg = PACKAGES.find(p => p.id === selectedPkg);
  const cs = getCS(pkg.cs);
  const tabs = ['overview','emails','social','case-study','intake','n8n','proposal'];

  app.innerHTML = `
    <div class="detail active">
      <div class="container">
        <button class="back-btn" onclick="goBack()">← Back to packages</button>

        <div class="detail-hero" style="background:var(--card);border-color:rgba(251,191,36,.2)">
          <div class="label" style="color:var(--gold)">${pkg.v}</div>
          <h1>${pkg.name}</h1>
          <div class="subdesc">${pkg.desc}</div>
          <div class="stat-boxes">
            ${pkg.price>0?`<div class="stat-box"><div class="stat-label">Setup</div><div class="stat-value" style="color:var(--gold)">$${pkg.price.toLocaleString()}</div></div>`:''}
            ${pkg.ret>0?`<div class="stat-box"><div class="stat-label">Monthly</div><div class="stat-value" style="color:var(--gold)">$${pkg.ret.toLocaleString()}/mo</div></div>`:''}
            <div class="stat-box"><div class="stat-label">Timeline</div><div class="stat-value">${pkg.timeline}</div></div>
          </div>
        </div>

        <!-- TAB NAV -->
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px">
          ${tabs.map(t => `<button class="filter-btn ${activeTab===t?'active':''}" onclick="setTab('${t}')" style="text-transform:capitalize">${t.replace('-',' ')}</button>`).join('')}
        </div>

        <!-- TAB CONTENT -->
        ${activeTab==='overview'?renderOverview(pkg,cs):''}
        ${activeTab==='emails'?renderEmails(pkg):''}
        ${activeTab==='social'?renderSocial(pkg):''}
        ${activeTab==='case-study'?renderCaseStudy(pkg,cs):''}
        ${activeTab==='intake'?renderIntake(pkg):''}
        ${activeTab==='n8n'?renderN8n(pkg):''}
        ${activeTab==='proposal'?renderProposal(pkg,cs):''}

        <div class="detail-cta" style="background:var(--card);border-color:rgba(251,191,36,.2)">
          <h3>Ready to get started with ${pkg.name}?</h3>
          <p>Book a 30-minute strategy call. No pressure — just a conversation about fit.</p>
          <button style="background:var(--gold);color:#000">Book Strategy Call →</button>
        </div>
      </div>
    </div>
  `;
}

function renderOverview(pkg, cs) {
  return `
    <div class="detail-grid">
      <div class="detail-panel">
        <h3 style="color:var(--gold)">What You Get</h3>
        ${pkg.features.map(f => `<div class="check-item"><span class="check" style="color:var(--gold)">✓</span><span>${f}</span></div>`).join('')}
      </div>
      <div class="detail-panel">
        <h3 style="color:var(--gold)">Best For</h3>
        <p style="color:#d4d4d8;font-size:14px;line-height:1.7">${pkg.persona}</p>
        <h3 style="color:var(--gold);margin-top:24px">Proven By</h3>
        <p style="font-weight:600;font-size:14px">${cs.name}</p>
        <p style="color:var(--muted);font-size:13px;margin-top:6px">${cs.headline}</p>
        <div class="metric-tags" style="margin-top:12px">
          ${cs.metrics.slice(0,4).map(m => `<span class="metric-tag" style="background:rgba(251,191,36,.1);color:var(--gold)">${m}</span>`).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderEmails(pkg) {
  return `
    <div class="email-section">
      <h3 style="color:var(--gold)">📧 Email Outreach Sequence (${pkg.emails.length} emails)</h3>
      <p style="color:var(--muted);font-size:13px;margin-bottom:16px">Cold outreach sequence for Acumbamail. Copy, customize, and deploy.</p>
      ${pkg.emails.map(e => `
        <div class="email-item">
          <div class="day" style="color:var(--gold)">${e.day}</div>
          <div class="subject">Subject: ${e.subj}</div>
          <div class="preview">${e.preview}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderSocial(pkg) {
  return `
    <div class="social-section">
      <h3 style="color:var(--gold)">📱 Social Media Content</h3>
      <p style="color:var(--muted);font-size:13px;margin-bottom:16px">Ready-to-post content for LinkedIn and Twitter/X.</p>
      ${pkg.social.map(s => `
        <div class="social-post">
          <div class="platform" style="color:var(--gold)">${s.platform}</div>

}

function renderCaseStudy(pkg, cs) {
  return `
    <div class="case-study-box">
      <h3 style="color:var(--gold)">📊 Case Study: ${cs.name}</h3>

      <div class="metric-tags">
        ${cs.metrics.map(m => `<span class="metric-tag" style="background:rgba(251,191,36,.1);color:var(--gold)">${m}</span>`).join('')}

      <p style="color:#d4d4d8;font-size:14px;line-height:1.7;margin:16px 0">${cs.story}</p>
      <div class="tech-stack">Stack: ${cs.stack}</div>
    </div>
  `;
}

function renderIntake(pkg) {
  return `
    <div class="intake-section">
      <h3 style="color:var(--gold)">📋 Client Intake Form — ${pkg.name}</h3>
      <p style="color:var(--muted);font-size:13px;margin-bottom:20px">Required information to begin this engagement.</p>
      <div class="form-field"><label>Full Name</label><input type="text" placeholder="Your name"></div>
      <div class="form-field"><label>Email</label><input type="email" placeholder="you@company.com"></div>
      <div class="form-field"><label>Company</label><input type="text" placeholder="Company name"></div>
      <div class="form-field"><label>Website</label><input type="url" placeholder="https://"></div>
      <div class="form-field"><label>Annual Revenue</label>
        <select><option>Select...</option><option>Under $100K</option><option>$100K-$500K</option><option>$500K-$1M</option><option>$1M-$5M</option><option>$5M+</option></select>
      </div>

      <button class="submit-btn">Submit & Book Strategy Call →</button>
    </div>
  `;
}

function renderN8n(pkg) {
  return `
    <div class="email-section">

        <div class="email-item">

        <p style="font-size:13px;color:var(--muted)"><strong style="color:var(--gold)">Master trigger:</strong> Stripe webhook (checkout.session.completed) → extracts client data → runs package-specific workflow above → sends welcome email + SMS → creates SuiteDash project → schedules kickoff call.</p>
      </div>
    </div>
  `;
}

      <div class="proposal-page">

        <h4>DYNASTY EMPIRE LLC — PROPOSAL</h4>

      <div class="proposal-page">
        <div class="gold-bar"></div>
        <h4>Deliverables</h4>
        <ol>${pkg.features.map(f => `<li style="margin-bottom:6px">${f}</li>`).join('')}</ol>
      </div>

      <div class="proposal-page">
        <div class="gold-bar"></div>
        <h4>Case Study: ${cs.name}</h4>
        <p>${cs.headline}</p>
        <p style="margin-top:8px"><em>${cs.metrics.join(' · ')}</em></p>
        <p style="margin-top:8px;font-size:11px;color:#666">Stack: ${cs.stack}</p>
      </div>

      <div class="proposal-page">
        <div class="gold-bar"></div>
        <h4>Why Dynasty Empire</h4>
        <ul>
          <li>PhD in Engineering · Full Professor at Gannon University</li>
          <li>332 academic citations · h-index 8</li>
          <li>Former AWS Fintech R&D UX Researcher</li>
          <li>200+ production tools · $75K+ arsenal value</li>

          <li>Multi-entity business operator (Wyoming Trust → Holdings → 6+ LLCs)</li>

      <div class="proposal-page">
        <div class="gold-bar"></div>

        <p>${pkg.price>0?'<strong>Setup fee:</strong> $'+pkg.price.toLocaleString()+' (50% on signing, 50% on delivery)<br>':''}
        ${pkg.ret>0?'<strong>Monthly retainer:</strong> $'+pkg.ret.toLocaleString()+'/month (begins after launch)<br>':''}
        <strong>Payment:</strong> Stripe, ACH, or wire transfer</p>
        <p style="margin-top:12px"><strong>Next steps:</strong><br>
        1. Sign the attached SOW<br>
        2. Submit 50% deposit<br>
        3. Complete intake form<br>
        4. Book kickoff call<br>
        5. We start building within 48 hours</p>
      </div>
    </div>
  `;
}

// Navigation functions
function setFilter(v) { activeFilter = v; selectedPkg = null; render(); window.scrollTo(0,300); }
function selectPkg(id) { selectedPkg = id; activeTab = 'overview'; render(); window.scrollTo(0,0); }
function goBack() { selectedPkg = null; render(); }
function setTab(t) { activeTab = t; render(); }
function showSection(s) { /* Future: global intake form */ }

// Initial render
render();
</script>
</body>
